services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert:/cert
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - n8n
      - certbot
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./cert:/cert
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet && cp -L /etc/letsencrypt/live/n8n.hellena.app/*.pem /cert/; done"
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always

    ports:
      - "4040:5678"

    environment:
      - TZ=Africa/Luanda
      - NODE_ENV=production

      - N8N_HOST=n8n.hellena.app
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.hellena.app/

      - N8N_SECURE_COOKIE=true

    volumes:
      - ./n8n_data:/home/node/.n8n

    user: "1000:1000"

    networks:
      - app-network

networks:
  app-network:
    driver: bridge
